name: CI

on:
  push:
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Validate plugin manifest JSON
        run: python -m json.tool .codex-plugin/plugin.json > /dev/null
      - name: Run tests
        run: python tests/run_tests.py
